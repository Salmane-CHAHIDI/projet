{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">📰 Actualités récentes</h2>
<form method="GET" class="mb-4">
    <div class="row">

        <div class="col-md-4">
            <input type="text" name="keyword" class="form-control" placeholder="Mot-clé">
        </div>

        <div class="col-md-3">
            <input type="date" name="start_date" class="form-control">
        </div>

        <div class="col-md-3">
            <input type="date" name="end_date" class="form-control">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Rechercher</button>
        </div>

    </div>
</form>
<div class="row">
    {% for article in articles %}
    <div class="col-md-6 mb-3">
        <div class="card shadow-sm h-100">
            <div class="card-body">
                
                <h5 class="card-title">
                    <a href="/click/{{ article._id }}" target="_blank">
                        {{ article.title }}
                    </a>
                </h5>

                <p class="text-muted small">
                    {{ article.date_publication }}
                </p>
                <p class="badge bg-secondary">{{ article.source }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
